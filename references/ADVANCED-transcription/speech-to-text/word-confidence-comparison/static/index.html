<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Confidence Comparison</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .word {
            padding: 2px 4px;
            border-radius: 3px;
            cursor: help;
            display: inline;
        }
        .word.low {
            background: rgba(220, 53, 69, 0.3);
            border-bottom: 2px solid #dc3545;
        }
        .word.medium {
            background: rgba(255, 193, 7, 0.3);
            border-bottom: 2px solid #ffc107;
        }
        .word.high {
            /* No special styling */
        }
        .provider-result {
            margin-bottom: 1.5rem;
        }
        .transcript {
            line-height: 1.8;
            font-size: 1rem;
        }
        .legend-dot {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 3px;
            margin-right: 6px;
            vertical-align: middle;
        }
        .legend-dot.low { background: rgba(220, 53, 69, 0.3); border-bottom: 2px solid #dc3545; }
        .legend-dot.medium { background: rgba(255, 193, 7, 0.3); border-bottom: 2px solid #ffc107; }
        .legend-dot.high { background: #fff; border: 1px solid #ccc; }
        #dropzone {
            border: 2px dashed #dee2e6;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
        }
        #dropzone:hover, #dropzone.dragover {
            border-color: #0d6efd;
            background-color: #f8f9fa;
        }
        #dropzone.has-file {
            border-color: #198754;
            background-color: #d1e7dd;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <h1 class="mb-3">Word Confidence Comparison</h1>
        <p class="text-muted mb-4">
            Compare transcription quality across different APIs. Words are highlighted by confidence.
        </p>

        <!-- Legend -->
        <div class="bg-light p-3 rounded mb-4">
            <span class="me-4"><span class="legend-dot high"></span> High (&ge;80%)</span>
            <span class="me-4"><span class="legend-dot medium"></span> Medium (60-80%)</span>
            <span class="me-4"><span class="legend-dot low"></span> Low (&lt;60%)</span>
            <span class="text-muted small">Hover words to see exact confidence</span>
        </div>

        <!-- Upload Form -->
        <div class="card mb-4">
            <div class="card-body">
                <div id="dropzone" onclick="document.getElementById('audioFile').click()">
                    <input type="file" id="audioFile" accept="audio/*" hidden>
                    <div id="dropzoneText">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-cloud-upload mb-2 text-muted" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M4.406 1.342A5.53 5.53 0 0 1 8 0c2.69 0 4.923 2 5.166 4.579C14.758 4.804 16 6.137 16 7.773 16 9.569 14.502 11 12.687 11H10a.5.5 0 0 1 0-1h2.688C13.979 10 15 8.988 15 7.773c0-1.216-1.02-2.228-2.313-2.228h-.5v-.5C12.188 2.825 10.328 1 8 1a4.53 4.53 0 0 0-2.941 1.1c-.757.652-1.153 1.438-1.153 2.055v.448l-.445.049C2.064 4.805 1 5.952 1 7.318 1 8.785 2.23 10 3.781 10H6a.5.5 0 0 1 0 1H3.781C1.708 11 0 9.366 0 7.318c0-1.763 1.266-3.223 2.942-3.593.143-.863.698-1.723 1.464-2.383z"/>
                            <path fill-rule="evenodd" d="M7.646 4.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 5.707V14.5a.5.5 0 0 1-1 0V5.707L5.354 7.854a.5.5 0 1 1-.708-.708l3-3z"/>
                        </svg>
                        <p class="mb-0">Click or drag audio file here</p>
                    </div>
                </div>

                <!-- Provider Selection -->
                <div class="mt-3">
                    <label class="form-label fw-bold">Providers</label>
                    <div class="row">
                        <div class="col-6 col-md-3">
                            <div class="form-check">
                                <input class="form-check-input provider-checkbox" type="checkbox" id="providerAssemblyAI" value="assemblyai" checked>
                                <label class="form-check-label" for="providerAssemblyAI">AssemblyAI</label>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="form-check">
                                <input class="form-check-input provider-checkbox" type="checkbox" id="providerSoniox" value="soniox" checked>
                                <label class="form-check-label" for="providerSoniox">Soniox</label>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="form-check">
                                <input class="form-check-input provider-checkbox" type="checkbox" id="providerWhisperLarge" value="whisper-large">
                                <label class="form-check-label" for="providerWhisperLarge">Whisper Large</label>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="form-check">
                                <input class="form-check-input provider-checkbox" type="checkbox" id="providerWhisperTurbo" value="whisper-turbo">
                                <label class="form-check-label" for="providerWhisperTurbo">Whisper Turbo</label>
                            </div>
                        </div>
                    </div>
                </div>

                <button id="transcribeBtn" class="btn btn-primary mt-3 w-100" disabled>
                    Transcribe
                </button>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="text-center my-4" style="display: none;">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">Transcribing... This may take a minute.</p>
        </div>

        <!-- Results -->
        <div id="results"></div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const audioFile = document.getElementById('audioFile');
        const transcribeBtn = document.getElementById('transcribeBtn');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');

        let selectedFile = null;

        // File selection
        audioFile.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                updateDropzone();
            }
        });

        // Drag and drop
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('dragover');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                selectedFile = e.dataTransfer.files[0];
                updateDropzone();
            }
        });

        function updateDropzone() {
            if (selectedFile) {
                dropzone.classList.add('has-file');
                document.getElementById('dropzoneText').innerHTML = `
                    <p class="mb-0 fw-bold">${escapeHtml(selectedFile.name)}</p>
                    <p class="mb-0 text-muted small">${(selectedFile.size / 1024 / 1024).toFixed(2)} MB</p>
                `;
                transcribeBtn.disabled = false;
            }
        }

        // Get selected providers
        function getSelectedProviders() {
            const checkboxes = document.querySelectorAll('.provider-checkbox:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        // Transcribe button
        transcribeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const providers = getSelectedProviders();
            if (providers.length === 0) {
                results.innerHTML = '<div class="alert alert-warning">Please select at least one provider.</div>';
                return;
            }

            // Show loading
            loading.style.display = 'block';
            results.innerHTML = '';
            transcribeBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('audio', selectedFile);
                formData.append('providers', JSON.stringify(providers));

                const response = await fetch('/api/transcribe', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    results.innerHTML = `<div class="alert alert-danger">${escapeHtml(data.error)}</div>`;
                } else {
                    renderResults(data.results);
                }
            } catch (error) {
                results.innerHTML = `<div class="alert alert-danger">Error: ${escapeHtml(error.message)}</div>`;
            } finally {
                loading.style.display = 'none';
                transcribeBtn.disabled = false;
            }
        });

        function renderResults(resultsData) {
            let html = '';

            for (const result of resultsData) {
                html += `
                    <div class="card provider-result">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">${escapeHtml(result.provider)}</h5>
                            <span class="badge bg-secondary">${result.duration_seconds.toFixed(2)}s</span>
                        </div>
                        <div class="card-body">
                `;

                if (result.error) {
                    html += `<div class="alert alert-danger mb-0">${escapeHtml(result.error)}</div>`;
                } else {
                    html += '<div class="transcript">';
                    for (const word of result.words) {
                        const conf = word.confidence || 1.0;
                        const confClass = getConfidenceClass(conf);
                        const title = `${(conf * 100).toFixed(1)}%`;
                        html += `<span class="word ${confClass}" title="${title}">${escapeHtml(word.text)}</span> `;
                    }
                    html += '</div>';
                }

                html += '</div></div>';
            }

            results.innerHTML = html;
        }

        function getConfidenceClass(confidence) {
            if (confidence < 0.6) return 'low';
            if (confidence < 0.8) return 'medium';
            return 'high';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
