# Kyutai STT Fine-tuning Configuration

# Model settings
model:
  model_id: "kyutai/stt-1b-en_fr-trfs"  # 1B model (2.6B doesn't work on Mac/MPS)
  device: "auto"  # "auto", "cuda", "mps", or "cpu"

# Dataset settings (uses ground truth text + TorchAudio forced alignment)
dataset:
  name: "Trelis/llm-lingo"
  split: "train"
  max_samples: null  # null for all samples, or integer to limit
  processed_data_path: "./processed_data.pkl"  # path to save/load processed samples
  force_reprocess: false  # use cached processed data

# Data processing settings
processing:
  stt_delay: 0.5  # Kyutai audio delay in seconds
  frame_hop_s: 0.08  # Seconds per codec frame (from model config: 1920/24000)
  pad_weight: 0.25  # Weight for PAD token loss

# Training settings
training:
  output_dir: "./kyutai-finetuned"
  num_epochs: 5
  batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-4  # Best result with pad_weight=0.25
  lr_scheduler_type: "constant"
  logging_steps: 1
  eval_strategy: "epoch"  # Evaluate at end of each epoch

# LoRA settings (set use_lora to true to use LoRA, false for full fine-tuning)
lora:
  use_lora: true  # false = full fine-tuning, true = LoRA
  rank: 32
  alpha: 32
  dropout: 0.1
  target_modules:
    - "q_proj.linear"
    - "k_proj.linear"
    - "v_proj.linear"
    - "o_proj.linear"
    - "fc1"
    - "fc2"
  use_rslora: true
