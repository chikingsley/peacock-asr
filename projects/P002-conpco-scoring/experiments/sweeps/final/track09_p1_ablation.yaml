# Track 09 Phase 1: ConPCO loss ablation on GOPT + GOP-SF
# 3 ablations × 5 seeds = 15 runs
# P1-A: MSE only (baseline), P1-B: MSE+OE, P1-C: MSE+OE+CLAP
program: projects/P002-conpco-scoring/code/track09_conpco_ablation.py
entity: peacockery
project: peacock-asr-p002-conpco-scoring
method: grid
metric:
  name: phn_pcc
  goal: maximize

command:
  - ${env}
  - PEACOCK_WANDB_GROUP=p002-track09-p1-ablation
  - PEACOCK_WANDB_RUN_PREFIX=p002
  - PEACOCK_WANDB_JOB_TYPE=ablation
  - PEACOCK_WANDB_TAGS=p002,conpco,track09,p1
  - uv
  - run
  - --project
  - projects/P002-conpco-scoring
  - python
  - ${program}
  - ${args}

parameters:
  ablation:
    values: ["p1a", "p1b", "p1c"]
  seed:
    values: [22, 33, 44, 55, 66]
  n-epochs:
    value: 100
  batch-size:
    value: 25
  lr:
    value: 0.001
  embed-dim:
    value: 24
  num-heads:
    value: 1
  depth:
    value: 3
  # Paper ConPCO hyperparams
  lambda-d:
    value: 0.5
  lambda-t:
    value: 0.1
  margin:
    value: 1.0
  lambda-clap-t2a:
    value: 0.5
  w-mse:
    value: 1.0
  w-oe:
    value: 1.0
  w-clap:
    value: 1.0
  tag:
    value: track09-p1
