program: training/train_phoneme_head.py
method: grid
metric:
  name: eval_loss
  goal: minimize

command:
  - ${env}
  - uv
  - run
  - ${program}
  - ${args}

parameters:
  model-name:
    value: facebook/wav2vec2-base
  output-dir:
    value: runs/output/wav2vec2-base-phoneme-en
  hub-repo:
    value: Peacockery/wav2vec2-base-phoneme-en
  batch-size:
    value: 8
  gradient-accumulation:
    value: 8
  learning-rate:
    value: 3e-5
  num-epochs:
    value: 3
  dataloader-workers:
    value: 4
