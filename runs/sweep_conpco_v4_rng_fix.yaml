# v4: RNG alignment fixes over v3
# Fixes vs v3:
#   1. Always create noise tensor (even noise=0) to match official RNG trajectory
#   2. Train validation pass each epoch (shuffled loader consumes RNG)
#   3. Report best-MSE-epoch metrics (official model selection criterion)
# Everything else identical to v3 (paper hyperparams from train_hierCB.sh)
program: runs/reproduce_conpco.py
method: grid
metric:
  name: best/phn_pcc
  goal: maximize

command:
  - ${env}
  - uv
  - run
  - ${program}
  - ${args}

parameters:
  seed:
    values: [22, 33, 44, 55, 66]
  conpco:
    values: ["on", "off"]
  n-epochs:
    value: 100
  batch-size:
    value: 25
  lr:
    value: 0.001
  # --- Paper's actual architecture (from train_hierCB.sh) ---
  embed-dim:
    value: 24
  heads:
    value: 1
  p-depth:
    value: 3
  w-depth:
    value: 2
  u-depth:
    value: 1
  ssl-drop:
    value: 0.2
  # --- Paper's actual ConPCO weights ---
  pco-ld:
    value: 0.5
  pco-lt:
    value: 0.1
  pco-mg:
    value: 1.0
  clap-t2a:
    value: 0.5
  tag:
    value: v4
  wandb-project:
    value: peacock-asr-runs
